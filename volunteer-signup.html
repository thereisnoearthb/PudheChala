<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Signup - Pudhe Chala</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sulphur+Point:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sulphur Point', sans-serif;
            font-weight: 400;
            text-align: justify;
            background-color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .page-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            position: fixed;
            z-index: 99;
            -webkit-backdrop-filter: blur(4px);
            backdrop-filter: blur(4px);
            box-shadow: 0px 3px 5px rgba(0, 0, 0, 0.1);
            background-color: #fff;
        }

        .logo-container {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 10px;
        }

        .title-container {
            width: 100%;
            margin-bottom: 20px;
            text-align: center;
        }

        .page-title {
            font-family: 'Sulphur Point', sans-serif;
            font-style: normal;
            font-weight: 700;
            font-size: 2rem;
            line-height: 1;
            color: #42367D;
            text-align: center;
            margin-top: 0.7em;
            margin-bottom: 0.25em;
        }

        .form-card {
            background-color: #fff;
            border-radius: 16px;
            border: 1px solid #000000;
            padding: 30px;
            margin-top: 150px;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
        }

        .checkbox-group label {
            font-weight: normal;
        }

        .submit-btn {
            display: block;
            width: 100%;
            background-color: #FFD900;
            color: black;
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            text-decoration: none;
            border: 1px solid #000000;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            font-family: 'Sulphur Point', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.15);
        }
    </style>
</head>

<body>

    <header class="page-header">
        <div class="logo-container">
            <a href="index.html">
                <img src="assets/pudhe-chala-logo.svg" alt="Pudhe Chala logo" />
            </a>
        </div>
    </header>

    <div class="container">
        <div class="form-card">
            <div class="title-container">
                <h1 class="page-title">Volunteer Signup</h1>
            </div>
            <form id="volunteer-form">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>
                <div class="form-group">
                    <label for="age">Age</label>
                    <input type="number" id="age" name="age" required>
                </div>
                <div class="form-group">
                    <label for="hours">Number of hours per week you can commit</label>
                    <input type="number" id="hours" name="hours" required min="1">
                </div>
                <div class="form-group">
                    <label>Interests</label>
                    <div class="checkbox-group">
                        <label><input type="checkbox" name="interests" value="tech"> Tech</label>
                        <label><input type="checkbox" name="interests" value="research"> Research</label>
                        <label><input type="checkbox" name="interests" value="content-creation"> Content Creation</label>
                    </div>
                </div>
                <button type="submit" class="submit-btn">Submit</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('volunteer-form').addEventListener('submit', function(event) {
            const ageInput = document.getElementById('age');
            if (ageInput.value < 18) {
                alert('You must be at least 18 years old to volunteer.');
                event.preventDefault();
            }
        });
    </script>

</body>

</html>
