<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Signup - Pudhe Chala</title>
    <!-- Bootstrap Styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
        crossorigin="anonymous"></script>
    <!-- Pudhe Chala CSS -->
    <link rel="stylesheet" href="css/volunteer-signup.css">
    <!-- Google Fonts import -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sulphur+Point:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sulphur Point', sans-serif;
        }
    </style>
</head>

<body>

    <header class="page-header">
        <div class="logo-container">
            <a href="index.html">
                <img src="assets/pudhe-chala-logo.svg" alt="Pudhe Chala logo" />
            </a>
        </div>
    </header>

    <div class="container d-flex justify-content-center w-100">
        <div class="form-card">
            <div class="text-center mb-4">
                <h1 class="h1 fw-bold text-dark">Volunteer Signup</h1>
            </div>

            <form id="volunteer-form">
                <div class="mb-3">
                    <label for="name" class="form-label">Name</label>
                    <input type="text" class="form-control" id="name" name="name" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>
                <div class="mb-3">
                    <label for="age" class="form-label">Age</label>
                    <input type="number" class="form-control" id="age" name="age" required min="18">
                </div>
                <div class="mb-3">
                    <label for="phone" class="form-label">Phone Number</label>
                    <input type="tel" class="form-control" id="phone" name="phone" required>
                </div>
                <div class="mb-3">
                    <label for="city" class="form-label">City</label>
                    <select class="form-select" id="city" name="city" required>
                        <option value="Mumbai">Mumbai</option>
                        <option value="Bengaluru">Bengaluru</option>
                        <option value="Delhi">Delhi</option>
                        <option value="Chandigarh">Chandigarh</option>
                        <option value="Chennai">Chennai</option>
                        <option value="Hyderabad">Hyderabad</option>
                        <option value="Lucknow">Lucknow</option>
                        <option value="Pune">Pune</option>
                        <option value="Kasganj">Kasganj</option>
                        <option value="Vizag">Vizag</option>
                        <option value="Goa">Goa</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Interests</label>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="interests" value="organizing-events"
                            id="interests-organizing">
                        <label class="form-check-label" for="interests-organizing">Organizing events</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="interests" value="participating-in-events"
                            id="interests-participating">
                        <label class="form-check-label" for="interests-participating">Participating in events</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="interests" value="research"
                            id="interests-research">
                        <label class="form-check-label" for="interests-research">Research- campaigning/writing</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="interests" value="content-creation"
                            id="interests-content">
                        <label class="form-check-label" for="interests-content">Content creation-
                            Creatives/Videos</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="interests" value="tech"
                            id="interests-tech">
                        <label class="form-check-label" for="interests-tech">Tech - Web development/Automation</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="interests" value="other-interest"
                            id="interests-other">
                        <label class="form-check-label" for="interests-other">Other</label>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">What language do you speak?</label>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="language" value="english"
                            id="lang-english">
                        <label class="form-check-label" for="lang-english">English</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="language" value="marathi"
                            id="lang-marathi">
                        <label class="form-check-label" for="lang-marathi">Marathi</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="language" value="hindi" id="lang-hindi">
                        <label class="form-check-label" for="lang-hindi">Hindi</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="language" value="other-language"
                            id="lang-other">
                        <label class="form-check-label" for="lang-other">Other</label>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="referral" class="form-label">Who referred you to TINEB? (Optional)</label>
                    <input type="text" class="form-control" id="referral" name="referral">
                </div>
                <div class="mb-3">
                    <label for="hours" class="form-label">How many hours can you devote per week?</label>
                    <input type="number" class="form-control" id="hours" name="hours" required min="1">
                </div>
                <div class="mb-3">
                    <label for="instagram" class="form-label">Instagram handle (Optional)</label>
                    <input type="text" class="form-control" id="instagram" name="instagram">
                </div>
                <div class="mb-3">
                    <label for="twitter" class="form-label">X (Formerly Twitter) handle (Optional)</label>
                    <input type="text" class="form-control" id="twitter" name="twitter">
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="community-guidelines"
                        name="community-guidelines">
                    <label class="form-check-label" for="community-guidelines">
                        I agree with the <a
                            href="https://docs.google.com/document/d/1kEdq0QSPuyv8gS5YZMM8Tq6ReBcqtGsmp00JrSXkc0s/edit?tab=t.0"
                            target="_blank" class="text-primary text-decoration-none">community guidelines</a>.
                    </label>
                </div>
                <button type="submit" id="submit-button" class="btn btn-primary">Submit</button>
            </form>
            <!-- Message container for success/error feedback -->
            <div id="message-container" class="mb-4 mt-4 text-center"></div>
        </div>
    </div>

    <!-- Form validation and submission script -->
    <script src="js/volunteer-signup.js"></script>
</body>

</html>
